<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ściśle Tajne</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #0b0c10;
            color: #66fcf1;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            user-select: none;
        }
        .container {
            text-align: center;
            position: relative;
            z-index: 2;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            letter-spacing: 2px;
            text-shadow: 0 0 10px #66fcf1;
        }
        .btn {
            background: transparent;
            color: #66fcf1;
            border: 2px solid #66fcf1;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(102, 252, 241, 0.2);
        }
        .btn:hover {
            background-color: #66fcf1;
            color: #0b0c10;
            box-shadow: 0 0 25px #66fcf1;
            transform: scale(1.05);
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        .hidden-message {
            display: none;
            font-size: 3rem;
            font-weight: bold;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); text-shadow: 0 0 10px #45f3ff; }
            50% { transform: scale(1.1); text-shadow: 0 0 30px #ff007f, 0 0 50px #ff007f; color: #ff007f; }
            100% { transform: scale(1); text-shadow: 0 0 10px #45f3ff; }
        }
    </style>
</head>
<body>

    <canvas id="particleCanvas"></canvas>

    <div class="container">
        <div id="setup">
            <h1 id="title">System gotowy do aktywacji</h1>
            <button class="btn" onclick="revealSurprise()">URUCHOM</button>
        </div>
        <div id="surprise" class="hidden-message">
            JESTEŚ NIESAMOWITY! 🚀
        </div>
    </div>

    <script>
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let activeMode = false;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor(x, y, color, speedX, speedY) {
                this.x = x || Math.random() * canvas.width;
                this.y = y || Math.random() * canvas.height;
                this.size = Math.random() * 3 + 1;
                this.speedX = speedX || (Math.random() - 0.5) * 1.5;
                this.speedY = speedY || (Math.random() - 0.5) * 1.5;
                this.color = color || '#45f3ff';
                this.alpha = 1;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (activeMode) {
                    this.alpha -= 0.01;
                } else {
                    if (this.x > canvas.width || this.x < 0) this.speedX *= -1;
                    if (this.y > canvas.height || this.y < 0) this.speedY *= -1;
                }
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        function initParticles() {
            for (let i = 0; i < 80; i++) {
                particles.push(new Particle());
            }
        }
        initParticles();

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (activeMode && Math.random() < 0.4) {
                const colors = ['#ff007f', '#45f3ff', '#00ffcc', '#ffff00'];
                const randomColor = colors[Math.floor(Math.random() * colors.length)];
                for(let i=0; i<5; i++) {
                    particles.push(new Particle(
                        canvas.width / 2, 
                        canvas.height / 2, 
                        randomColor, 
                        (Math.random() - 0.5) * 8, 
                        (Math.random() - 0.5) * 8
                    ));
                }
            }

            particles.forEach((p, index) => {
                p.update();
                p.draw();
                if (p.alpha <= 0) particles.splice(index, 1);
            });

            requestAnimationFrame(animate);
        }
        animate();

        function revealSurprise() {
            document.getElementById('setup').style.display = 'none';
            document.getElementById('surprise').style.display = 'block';
            activeMode = true;
            document.body.style.backgroundColor = '#050510';
        }
    </script>
</body>
</html>
