<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synthwave Pinball PWA</title>
    <meta name="theme-color" content="#ff007f">
    <style>
        :root { --neon-pink: #ff007f; --neon-blue: #00f0ff; --bg: #050510; }
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body { background: var(--bg); color: #fff; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
        #game-container { position: relative; width: 100%; max-width: 400px; display: flex; flex-direction: column; align-items: center; }
        .hud { width: 100%; display: flex; justify-content: space-between; padding: 10px; font-size: 1.2rem; color: var(--neon-blue); text-shadow: 0 0 5px var(--neon-blue); }
        canvas { background: #0a0a20; border: 4px solid var(--neon-pink); border-radius: 20px; box-shadow: 0 0 20px rgba(255, 0, 127, 0.5); touch-action: none; width: 100%; }
        .controls-info { margin-top: 10px; font-size: 0.8rem; color: #6d6d9c; text-align: center; }
    </style>
</head>
<body>

    <div id="game-container">
        <div class="hud">
            <div>SCORE: <span id="score">0000</span></div>
            <div>HI: <span id="highscore">0000</span></div>
        </div>
        
        <canvas id="gameCanvas" width="400" height="600"></canvas>
        
        <div class="controls-info">
            PC: Strzałka w Lewo / Prawo | Tel: Kliknij lewą/prawą stronę ekranu
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // --- SYSTEM AUDIO (Generowany syntezatorem z przeglądarki) ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSynthTone(freq, type, duration) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        // --- STAN GRY ---
        let score = 0;
        let highscore = localStorage.getItem('pinball_hi') || 0;
        document.getElementById('highscore').innerText = highscore.toString().padStart(4, '0');

        // --- FIZYKA I OBIEKTY ---
        let ball = { x: 200, y: 150, vx: 3, vy: 0, radius: 10, gravity: 0.25 };
        
        let flippers = {
            left: { x: 120, y: 540, length: 70, angle: 0.3, targetAngle: 0.3, isPressed: false },
            right: { x: 280, y: 540, length: 70, angle: Math.PI - 0.3, targetAngle: Math.PI - 0.3, isPressed: false }
        };

        let bumpers = [
            { x: 130, y: 160, r: 25, color: '#00f0ff' },
            { x: 270, y: 160, r: 25, color: '#00f0ff' },
            { x: 200, y: 260, r: 30, color: '#ff007f' }
        ];

        // --- STEROWANIE ---
        const pressLeft = () => { flippers.left.targetAngle = -0.4; flippers.left.isPressed = true; playSynthTone(300, 'square', 0.05); };
        const releaseLeft = () => { flippers.left.targetAngle = 0.3; flippers.left.isPressed = false; };
        const pressRight = () => { flippers.right.targetAngle = Math.PI + 0.4; flippers.right.isPressed = true; playSynthTone(300, 'square', 0.05); };
        const releaseRight = () => { flippers.right.targetAngle = Math.PI - 0.3; flippers.right.isPressed = false; };

        // Klawiatura
        window.addEventListener('keydown', e => {
            if (e.key === 'ArrowLeft') pressLeft();
            if (e.key === 'ArrowRight') pressRight();
        });
        window.addEventListener('keyup', e => {
            if (e.key === 'ArrowLeft') releaseLeft();
            if (e.key === 'ArrowRight') releaseRight();
        });

        // Ekran dotykowy / Mysz
        window.addEventListener('touchstart', e => {
            const touchX = e.touches[0].clientX;
            if (touchX < window.innerWidth / 2) pressLeft(); else pressRight();
        });
        window.addEventListener('touchend', e => {
            releaseLeft(); releaseRight();
        });

        // --- PĘTLA GŁÓWNA GRY ---
        function update() {
            // Ruch piłki i grawitacja
            ball.vy += ball.gravity;
            ball.x += ball.vx;
            ball.y += ball.vy;

            // Odbicia od ścian
            if (ball.x - ball.radius < 0) { ball.x = ball.radius; ball.vx *= -0.8; playSynthTone(150, 'triangle', 0.1); }
            if (ball.x + ball.radius > canvas.width) { ball.x = canvas.width - ball.radius; ball.vx *= -0.8; playSynthTone(150, 'triangle', 0.1); }
            if (ball.y - ball.radius < 0) { ball.y = ball.radius; ball.vy *= -0.8; }

            // Płynny ruch łopatek (Flippery)
            flippers.left.angle += (flippers.left.targetAngle - flippers.left.angle) * 0.4;
            flippers.right.angle += (flippers.right.targetAngle - flippers.right.angle) * 0.4;

            // Kolizje z bumperami
            bumpers.forEach(b => {
                let dx = ball.x - b.x;
                let dy = ball.y - b.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < ball.radius + b.r) {
                    // Matematyka odbicia wektorowego
                    let nx = dx / dist;
                    let ny = dy / dist;
                    let penetration = (ball.radius + b.r) - dist;
                    ball.x += nx * penetration;
                    
                    let dot = ball.vx * nx + ball.vy * ny;
                    ball.vx = (ball.vx - 2 * dot * nx) * 1.3; // Przyspieszenie po odbiciu
                    ball.vy = (ball.vy - 2 * dot * ny) * 1.3;
                    
                    score += 10;
                    document.getElementById('score').innerText = score.toString().padStart(4, '0');
                    playSynthTone(600, 'sine', 0.15);
                }
            });

            // Kolizja z lewym flipperem (uproszczona fizyka punkt-linia)
            if (ball.y > 500 && ball.y < 560) {
                [flippers.left, flippers.right].forEach(f => {
                    let endX = f.x + Math.cos(f.angle) * f.length;
                    let endY = f.y + Math.sin(f.angle) * f.length;
                    
                    // Odległość piłki od ramienia flippera
                    let l2 = f.length * f.length;
                    let t = ((ball.x - f.x) * (endX - f.x) + (ball.y - f.y) * (endY - f.y)) / l2;
                    t = Math.max(0, Math.min(1, t));
                    let projX = f.x + t * (endX - f.x);
                    let projY = f.y + t * (endY - f.y);
                    let dist = Math.sqrt((ball.x - projX)**2 + (ball.y - projY)**2);

                    if (dist < ball.radius + 5) {
                        ball.vy = f.isPressed ? -7 : -3;
                        ball.vx += f.isPressed ? (f === flippers.left ? 3 : -3) : 0;
                        playSynthTone(400, 'sawtooth', 0.1);
                    }
                });
            }

            // Reset w przypadku spadnięcia (Przegrana)
            if (ball.y > canvas.height) {
                playSynthTone(80, 'sawtooth', 0.5);
                if (score > highscore) {
                    highscore = score;
                    localStorage.setItem('pinball_hi', highscore);
                    document.getElementById('highscore').innerText = highscore.toString().padStart(4, '0');
                }
                score = 0;
                document.getElementById('score').innerText = "0000";
                ball = { x: Math.random() * 200 + 100, y: 100, vx: 2, vy: 0, radius: 10, gravity: 0.25 };
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Rysowanie neonowych linii pomocniczych / tła
            ctx.strokeStyle = '#151535';
            ctx.lineWidth = 2;
            for(let i=0; i<canvas.height; i+=40) {
                ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke();
            }

            // Bumpery
            bumpers.forEach(b => {
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
                ctx.fillStyle = '#050515';
                ctx.fill();
                ctx.strokeStyle = b.color;
                ctx.lineWidth = 5;
                ctx.shadowBlur = 15;
                ctx.shadowColor = b.color;
                ctx.stroke();
            });
            ctx.shadowBlur = 0; // Reset cieni

            // Flippery
            [flippers.left, flippers.right].forEach(f => {
                ctx.beginPath();
                ctx.moveTo(f.x, f.y);
                ctx.lineTo(f.x + Math.cos(f.angle) * f.length, f.y + Math.sin(f.angle) * f.length);
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 10;
                ctx.lineCap = 'round';
                ctx.stroke();
            });

            // Piłka
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fillStyle = varName = '#fff';
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#fff';
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        // --- MONOLITYCZNE AUTOMATYCZNE PWA ---
        const manifestObj = {
            "short_name": "SynthPinball",
            "name": "Synthwave Cyber Pinball PWA",
            "start_url": window.location.href,
            "background_color": "#050510",
            "display": "standalone",
            "theme_color": "#ff007f",
            "icons": [{"src": "https://github.com/fluidicon.png", "type": "image/png", "sizes": "512x512"}]
        };
        const manifestBlob = new Blob([JSON.stringify(manifestObj)], {type: 'application/json'});
        const manifestURL = URL.createObjectURL(manifestBlob);
        const manifestLink = document.createElement('link');
        manifestLink.rel = 'manifest'; manifestLink.href = manifestURL;
        document.head.appendChild(manifestLink);

        const swCode = `
            const CACHE_NAME = 'pinball-v1';
            self.addEventListener('install', e => {
                e.waitUntil(caches.open(CACHE_NAME).then(cache => cache.add(location.href)));
            });
            self.addEventListener('fetch', e => {
                e.respondWith(caches.match(e.request).then(res => res || fetch(e.request)));
            });
        `;
        if ('serviceWorker' in navigator) {
            const swBlob = new Blob([swCode], {type: 'text/javascript'});
            window.navigator.serviceWorker.register(URL.createObjectURL(swBlob), { scope: './' });
        }

        // Start gry
        loop();
    </script>
</body>
</html>
