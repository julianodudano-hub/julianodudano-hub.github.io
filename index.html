<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zaawansowany Panel Dashboard</title>
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --transition: all 0.3s ease;
        }

        [data-theme="light"] {
            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --accent: #2563eb;
            --accent-hover: #1d4ed8;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            transition: var(--transition);
            min-height: 100vh;
            display: flex;
        }

        /* Sidebar */
        aside {
            width: 260px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.05em;
            color: var(--accent);
        }

        nav ul {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        nav a {
            color: var(--text-muted);
            text-decoration: none;
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            display: block;
            transition: var(--transition);
            font-weight: 500;
        }

        nav a:hover, nav a.active {
            background: var(--bg-primary);
            color: var(--accent);
        }

        /* Main Content */
        main {
            flex-grow: 1;
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .btn {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
        }

        .btn:hover {
            background: var(--accent-hover);
        }

        .btn-toggle {
            background: transparent;
            color: var(--text-main);
            border: 1px solid var(--border);
        }

        /* Grid System */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 100fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            padding: 1.5rem;
            transition: var(--transition);
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .card h3 {
            margin-bottom: 0.5rem;
            font-size: 1.1rem;
            color: var(--text-muted);
        }

        .card .value {
            font-size: 2rem;
            font-weight: 700;
        }

        /* Data Table */
        .table-container {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th, td {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border);
        }

        th {
            background: rgba(0,0,0,0.02);
            color: var(--text-muted);
            font-weight: 600;
        }

        tr:last-child td {
            border-bottom: none;
        }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            aside { width: 100%; padding: 1rem; }
        }
    </style>
</head>
<body>

    <aside>
        <div class="logo">CORE.OS</div>
        <nav>
            <ul>
                <li><a href="#" class="active">Dashboard</a></li>
                <li><a href="#">Analityka</a></li>
                <li><a href="#">Użytkownicy</a></li>
                <li><a href="#">Ustawienia</a></li>
            </ul>
        </nav>
    </aside>

    <main>
        <header>
            <div>
                <h1>Witaj ponownie</h1>
                <p style="color: var(--text-muted);">Oto podsumowanie operacji z dzisiejszego dnia.</p>
            </div>
            <div style="display: flex; gap: 1rem;">
                <button class="btn btn-toggle" id="themeToggle">Zmień motyw</button>
                <button class="btn" id="actionBtn">Generuj raport</button>
            </div>
        </header>

        <section class="grid">
            <div class="card">
                <h3>Wyświetlenia</h3>
                <div class="value" id="stat-views">142,384</div>
            </div>
            <div class="card">
                <h3>Konwersja</h3>
                <div class="value" id="stat-conversion">2.48%</div>
            </div>
            <div class="card">
                <h3>Przychód</h3>
                <div class="value" id="stat-revenue">$12,492</div>
            </div>
        </section>

        <section class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Status</th>
                        <th>Użytkownik</th>
                        <th>Data</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    </tbody>
            </table>
        </section>
    </main>

    <script>
        // Zarządzanie motywem (Light/Dark)
        const themeToggle = document.getElementById('themeToggle');
        const currentTheme = localStorage.getItem('theme') || 'dark';
        
        document.documentElement.setAttribute('data-theme', currentTheme);

        themeToggle.addEventListener('click', () => {
            const theme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
        });

        // Dynamiczne generowanie danych (Mock API response)
        const mockData = [
            { id: "#1024", status: "Sukces", user: "Jan Kowalski", date: "Dzisiaj, 14:32" },
            { id: "#1023", status: "W toku", user: "Anna Nowak", date: "Dzisiaj, 12:15" },
            { id: "#1022", status: "Błąd", user: "Piotr Zieliński", date: "Wczoraj, 18:45" }
        ];

        const tableBody = document.getElementById('tableBody');
        tableBody.innerHTML = mockData.map(row => `
            <tr>
                <td>style="font-weight:600;"${row.id}</td>
                <td><span style="color: ${row.status === 'Sukces' ? '#10b981' : row.status === 'W toku' ? '#f59e0b' : '#ef4444'}">${row.status}</span></td>
                <td>${row.user}</td>
                <td style="color: var(--text-muted);">${row.date}</td>
            </tr>
        `).join('');

        // Interakcja przycisku głównego
        document.getElementById('actionBtn').addEventListener('click', () => {
            // Animacja losowych liczb w statystykach jako symulacja odświeżenia danych
            document.getElementById('stat-views').innerText = Math.floor(Math.random() * 200000).toLocaleString();
            document.getElementById('stat-revenue').innerText = '$' + Math.floor(Math.random() * 20000).toLocaleString();
        });
    </script>
</body>
</html>
