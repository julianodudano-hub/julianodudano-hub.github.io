<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Space Survival - CSS ONLY (No JS)</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: radial-gradient(circle at center, #0b0b26 0%, #050510 100%);
            font-family: 'Segoe UI', sans-serif;
            color: white;
        }

        /* --- MECHANIKA PUNKTÓW (CSS Counter) --- */
        body {
            counter-reset: score 0;
        }
        /* Każdy zaznaczony (trafiony) wróg zwiększa licznik o 1 */
        input:checked {
            counter-increment: score;
        }
        #scoreDisplay::after {
            content: counter(score);
            font-weight: bold;
            color: #00d2d3;
        }

        /* --- STREFA GRY / ŚLEDZENIE PALCA I MYSZKI --- */
        /* Kontener gry działa jako detektor pozycji dotyku/myszy */
        .game-container {
            position: relative;
            width: 100%;
            height: 100%;
            cursor: crosshair;
        }

        /* --- GRACZ (STATEK) --- */
        /* Statek pozycjonujemy na środku dołu ekranu. W czystym CSS sprawiamy, 
           że porusza się w lewo/prawo na podstawie najechania na strefę gry */
        .player-space {
            position: absolute;
            bottom: 40px;
            left: 0;
            width: 100%;
            height: 200px;
            pointer-events: none; /* Żeby nie blokował klikania we wrogów */
            display: flex;
            justify-content: center;
        }
        .player {
            width: 40px;
            height: 40px;
            background: #00d2d3;
            clip-path: polygon(50% 0%, 0% 100%, 50% 75%, 100% 100%);
            box-shadow: 0 0 15px #00d2d3;
            transition: transform 0.1s ease-out;
        }

        /* Sterowanie: Statek reaguje na ruch myszy/palca po lewej lub prawej stronie ekranu */
        .game-container:hover .player {
            /* Przykład prostego śledzenia osi X na PC */
        }
        /* Wsparcie mobilne / uproszczone: podział ekranu na niewidzialne strefy sterowania */
        .control-gate {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 50%;
            z-index: 5;
        }
        .gate-left { left: 0; }
        .gate-right { right: 0; }

        /* Interakcja: poruszanie statkiem w lewo/prawo przy hoverze stref */
        .gate-left:hover ~ .player-space .player { transform: translateX(-80px) rotate(-15deg); }
        .gate-right:hover ~ .player-space .player { transform: translateX(80px) rotate(15deg); }

        /* --- WROGOWIE (SYSTEM UKRYTYCH CHECKBOXÓW) --- */
        input[type="checkbox"] {
            display: none;
        }

        .enemy {
            position: absolute;
            width: 50px;
            height: 50px;
            background: #ff4757;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 10;
            box-shadow: 0 0 10px #ff4757;
            animation-fill-mode: forwards;
        }
        /* Wygląd rdzenia kosmity */
        .enemy::before {
            content: '';
            width: 20px;
            height: 20px;
            background: #fff;
            border-radius: 50%;
        }

        /* Usunięcie wroga po kliknięciu (strzale) */
        #e1:checked ~ .enemy-1,
        #e2:checked ~ .enemy-2,
        #e3:checked ~ .enemy-3,
        #e4:checked ~ .enemy-4 {
            display: none;
        }

        /* --- ANIMACJE / ATRAKCJA WROGÓW (FALE) --- */
        /* Każdy wróg leci z góry na dół z inną prędkością i opóźnieniem */
        .enemy-1 { left: 20%; top: -60px; animation: flyDown 4s linear infinite; animation-delay: 0s; }
        .enemy-2 { left: 50%; top: -60px; animation: flyDown 3s linear infinite; animation-delay: 1.5s; }
        .enemy-3 { left: 75%; top: -60px; animation: flyDown 5s linear infinite; animation-delay: 0.5s; }
        .enemy-4 { left: 35%; top: -60px; animation: flyDown 3.5s linear infinite; animation-delay: 2.5s; }

        @keyframes flyDown {
            0% { top: -60px; transform: scale(1); opacity: 1; }
            90% { opacity: 1; }
            100% { top: 85%; transform: scale(1.2); }
        }

        /* --- INTERFEJS UI --- */
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 30;
            font-size: 20px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
            pointer-events: none;
        }

        .instrukcja {
            position: absolute;
            bottom: 10px;
            width: 100%;
            text-align: center;
            color: rgba(255,255,255,0.4);
            font-size: 12px;
            z-index: 30;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="game-container">
        
        <!-- UI Licznika -->
        <div id="ui">
            <div id="scoreDisplay">Ustrzeleni obcy: </div>
        </div>

        <!-- Strefy sterowania dotykowego / myszy -->
        <div class="control-gate gate-left"></div>
        <div class="control-gate gate-right"></div>

        <!-- Ukryta logika punktacji (Checkboxy muszą być przed elementami graficznymi) -->
        <input type="checkbox" id="e1">
        <input type="checkbox" id="e2">
        <input type="checkbox" id="e3">
        <input type="checkbox" id="e4">

        <!-- Obiekty wrogów sprzężone z checkboxami poprzez tag <label> -->
        <label for="e1" class="enemy enemy-1"></label>
        <label for="e2" class="enemy enemy-2"></label>
        <label for="e3" class="enemy enemy-3"></label>
        <label for="e4" class="enemy enemy-4"></label>

        <!-- Przestrzeń Gracza -->
        <div class="player-space">
            <div class="player"></div>
        </div>

        <div class="instrukcja">
            KOMPUTER: Ruszaj myszką po lewej/prawej stronie by unikać. Klikaj we wrogów by strzelać.<br>
            TELEFON: Przytrzymaj palec po lewej/prawej stronie ekranu by sterować. Tapuj wrogów, aby ich zniszczyć.
        </div>

    </div>

</body>
</html>
