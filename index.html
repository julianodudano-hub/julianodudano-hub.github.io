<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multitool PWA v2</title>
    <meta name="theme-color" content="#4f46e5">
    
    <style>
        :root { --bg: #090d16; --card: #111827; --border: #1f2937; --text: #f3f4f6; --accent: #6366f1; --accent-hover: #4f46e5; --success: #10b981; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 20px; display: flex; justify-content: center; }
        .wrapper { max-width: 800px; width: 100%; }
        
        header { text-align: center; margin-bottom: 30px; padding: 20px 0; border-bottom: 1px solid var(--border); }
        header h1 { color: #fff; font-size: 2rem; margin-bottom: 5px; }
        header p { color: #9ca3af; font-size: 0.9rem; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); }
        .card h2 { font-size: 1.2rem; margin-bottom: 15px; color: #fff; display: flex; align-items: center; gap: 10px; }
        
        /* Formularze i elementy interfejsu */
        input, textarea, select, button { width: 100%; padding: 10px; background: #1f2937; border: 1px solid var(--border); border-radius: 6px; color: #fff; font-size: 0.95rem; margin-bottom: 12px; outline: none; }
        input:focus, textarea:focus { border-color: var(--accent); }
        button { background: var(--accent); cursor: pointer; font-weight: 600; border: none; transition: background 0.2s; }
        button:hover { background: var(--accent-hover); }
        
        /* Specyficzne style funkcji */
        .badge { display: inline-block; padding: 3px 8px; background: rgba(99, 102, 241, 0.2); color: var(--accent); border-radius: 4px; font-size: 0.8rem; font-weight: bold; }
        #qr-output { display: flex; justify-content: center; margin-top: 10px; background: white; padding: 10px; border-radius: 8px; width: fit-content; margin: 10px auto 0; }
        .stats { display: flex; justify-content: space-between; font-size: 0.85rem; color: #9ca3af; margin-top: -5px; margin-bottom: 10px; }
        .status-bar { background: #111827; border: 1px solid var(--border); border-radius: 8px; padding: 12px; text-align: center; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="wrapper">
        <header>
            <h1>Kwantowy Scyzoryk PWA</h1>
            <p>Zestaw autonomicznych narzędzi offline ukryty w jednym pliku</p>
        </header>

        <div class="grid">
            <div class="card">
                <h2>🔐 Hasła & Kody QR</h2>
                <button onclick="generateSecurePassword()">Generuj bezpieczne hasło</button>
                <input type="text" id="password-out" placeholder="Wygenerowane hasło..." readonly>
                <p style="font-size:0.8rem; color:#9ca3af; margin-bottom:5px;">Kod QR dla tekstu/hasła:</p>
                <div id="qr-output"></div>
            </div>

            <div class="card">
                <h2>🌐 Światowy Czas</h2>
                <label style="font-size:0.8rem; color:#9ca3af;">Wybierz strefę docelową:</label>
                <select id="timezone-select" onchange="updateWorldTime()">
                    <option value="America/New_York">Nowy Jork (EST)</option>
                    <option value="Europe/London">Londyn (GMT)</option>
                    <option value="Asia/Tokyo">Tokio (JST)</option>
                    <option value="Australia/Sydney">Sydney (AEST)</option>
                </select>
                <div style="font-size: 1.5rem; font-weight: bold; text-align: center; margin: 15px 0; color: var(--accent);" id="world-time-display">--:--:--</div>
                <p id="local-time-diff" style="font-size:0.8rem; text-align:center; color:#9ca3af;"></p>
            </div>

            <div class="card">
                <h2>✍️ Analizator i Szyfr Cezara</h2>
                <textarea id="text-analysis-input" rows="3" placeholder="Wpisz tekst do analizy i szyfrowania..." oninput="analyzeAndEncrypt()"></textarea>
                <div class="stats">
                    <span>Znaki: <strong id="stat-chars">0</strong></span>
                    <span>Słowa: <strong id="stat-words">0</strong></span>
                </div>
                <input type="text" id="cipher-output" placeholder="Tekst zaszyfrowany (Przesunięcie +3)..." readonly>
            </div>

            <div class="card">
                <h2>📝 Lokalny Notatnik</h2>
                <textarea id="notepad" rows="6" placeholder="Twoje notatki zapisują się same na tym urządzeniu..." oninput="saveNote()"></textarea>
                <p style="font-size:0.75rem; color:var(--success); text-align: right;" id="save-status">Zapisano lokalnie ✓</p>
            </div>
        </div>

        <div class="status-bar">
            Stan aplikacji: <span id="app-net-status" class="badge">Sprawdzanie...</span>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>

    <script>
        // ==========================================
        // 1. LOGIKA GENEROWANIA HASEŁ I QR
        // ==========================================
        function generateSecurePassword() {
            const chars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()_+";
            let password = "";
            const randomValues = new Uint32Array(16);
            window.crypto.getRandomValues(randomValues);
            for (let i = 0; i < 16; i++) {
                password += chars[randomValues[i] % chars.length];
            }
            document.getElementById('password-out').value = password;
            generateQR(password);
        }

        function generateQR(text) {
            try {
                // qrcode-generator tworzy kod w czystym JS
                const typeNumber = 0;
                const errorCorrectionLevel = 'L';
                const qr = qrcode(typeNumber, errorCorrectionLevel);
                qr.addData(text);
                qr.make();
                document.getElementById('qr-output').innerHTML = qr.createImgTag(4);
            } catch(e) {
                document.getElementById('qr-output').innerText = "Wpisz coś lub wygeneruj hasło";
            }
        }

        // ==========================================
        // 2. LOGIKA STREF CZASOWYCH
        // ==========================================
        function updateWorldTime() {
            const tz = document.getElementById('timezone-select').value;
            const options = { timeZone: tz, hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
            const formatter = new Intl.DateTimeFormat('pl-PL', options);
            document.getElementById('world-time-display').innerText = formatter.format(new Date());
        }
        setInterval(updateWorldTime, 1000);

        // ==========================================
        // 3. ANALIZATOR I SZYFRATOR
        // ==========================================
        function analyzeAndEncrypt() {
            const txt = document.getElementById('text-analysis-input').value;
            
            // Statystyki
            document.getElementById('stat-chars').innerText = txt.length;
            document.getElementById('stat-words').innerText = txt.trim() === "" ? 0 : txt.trim().split(/\s+/).length;
            
            // Szyfr Cezara (przesunięcie o 3)
            let ciphered = "";
            for (let i = 0; i < txt.length; i++) {
                let code = txt.charCodeAt(i);
                if (code >= 65 && code <= 90) ciphered += String.fromCharCode(((code - 65 + 3) % 26) + 65);
                else if (code >= 97 && code <= 122) ciphered += String.fromCharCode(((code - 97 + 3) % 26) + 97);
                else ciphered += txt.charAt(i);
            }
            document.getElementById('cipher-output').value = ciphered;
            if(txt.length > 0) generateQR(txt); // Generuj też QR dla wpisywanego tekstu!
        }

        // ==========================================
        // 4. NOTATNIK (LOCAL STORAGE)
        // ==========================================
        function saveNote() {
            const note = document.getElementById('notepad').value;
            localStorage.setItem('gh_multitool_note', note);
            const status = document.getElementById('save-status');
            status.innerText = "Zapisywanie...";
            setTimeout(() => { status.innerText = "Zapisano lokalnie ✓"; }, 500);
        }
        
        // Wczytaj notatkę na starcie
        document.getElementById('notepad').value = localStorage.getItem('gh_multitool_note') || "";

        // ==========================================
        // MAGIA MONOLITYCZNEGO PWA (MANIFEST + OFFLINE)
        // ==========================================
        const manifestObj = {
            "short_name": "Sczyzoryk",
            "name": "Kwantowy Scyzoryk Multitool",
            "start_url": window.location.href,
            "background_color": "#090d16",
            "display": "standalone",
            "theme_color": "#4f46e5",
            "icons": [{"src": "https://github.com/fluidicon.png", "type": "image/png", "sizes": "512x512"}]
        };
        const manifestBlob = new Blob([JSON.stringify(manifestObj)], {type: 'application/json'});
        const manifestURL = URL.createObjectURL(manifestBlob);
        const manifestLink = document.createElement('link');
        manifestLink.rel = 'manifest';
        manifestLink.href = manifestURL;
        document.head.appendChild(manifestLink);

        const swCode = `
            const CACHE_NAME = 'multitool-cache-v2';
            const ASSETS = [location.href, 'https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js'];
            self.addEventListener('install', e => {
                e.waitUntil(caches.open(CACHE_NAME).then(cache => cache.addAll(ASSETS)));
            });
            self.addEventListener('fetch', e => {
                e.respondWith(caches.match(e.request).then(res => res || fetch(e.request)));
            });
        `;

        if ('serviceWorker' in navigator) {
            const swBlob = new Blob([swCode], {type: 'text/javascript'});
            const swUrl = URL.createObjectURL(swBlob);
            window.addEventListener('load', () => { navigator.serviceWorker.register(swUrl, { scope: './' }); });
        }

        function checkNet() {
            const badge = document.getElementById('app-net-status');
            if(navigator.onLine) {
                badge.innerText = "ONLINE + CACHED";
                badge.style.background = "rgba(16, 185, 129, 0.2)";
                badge.style.color = "var(--success)";
            } else {
                badge.innerText = "TRYB OFFLINE";
                badge.style.background = "rgba(239, 68, 68, 0.2)";
                badge.style.color = "#ef4444";
            }
        }
        window.addEventListener('online', checkNet);
        window.addEventListener('offline', checkNet);
        checkNet();
        generateQR("Kwantowy Scyzoryk");
    </script>
</body>
</html>
