<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Car CSS Only</title>
    <style>
        /* Stylizacja ogólna i reset */
        body {
            margin: 0;
            height: 100vh;
            background: radial-gradient(circle, #2c3e50, #0f171e);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1200px; /* Perspektywa 3D dla całej sceny */
            font-family: Arial, sans-serif;
        }

        h1 {
            position: absolute;
            top: 20px;
            color: #fff;
            font-weight: 300;
            letter-spacing: 2px;
            pointer-events: none;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        p {
            position: absolute;
            bottom: 20px;
            color: #8a9ba8;
            pointer-events: none;
        }

        /* --- MECHANIZM OBRACANIA BEZ JS --- */
        /* Tworzymy siatkę niewidzialnych stref. Najechanie na daną strefę obraca auto */
        .rotation-controller {
            position: absolute;
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            z-index: 10;
        }

        .zone {
            height: 100%;
        }

        /* Mapowanie stref na konkretne kąty obrotu bazy auta */
        .zone:nth-child(1):hover ~ .scene .car-base { transform: rotateX(-15px) rotateY(0deg); }
        .zone:nth-child(2):hover ~ .scene .car-base { transform: rotateX(-15deg) rotateY(40deg); }
        .zone:nth-child(3):hover ~ .scene .car-base { transform: rotateX(-15deg) rotateY(80deg); }
        .zone:nth-child(4):hover ~ .scene .car-base { transform: rotateX(-15deg) rotateY(120deg); }
        .zone:nth-child(5):hover ~ .scene .car-base { transform: rotateX(-15deg) rotateY(160deg); }
        .zone:nth-child(6):hover ~ .scene .car-base { transform: rotateX(-15deg) rotateY(200deg); }
        .zone:nth-child(7):hover ~ .scene .car-base { transform: rotateX(-15deg) rotateY(240deg); }
        .zone:nth-child(8):hover ~ .scene .car-base { transform: rotateX(-15deg) rotateY(280deg); }
        .zone:nth-child(9):hover ~ .scene .car-base { transform: rotateX(-15deg) rotateY(320deg); }
        .zone:nth-child(10):hover ~ .scene .car-base { transform: rotateX(-15deg) rotateY(360deg); }

        /* --- SCENA 3D --- */
        .scene {
            position: relative;
            width: 400px;
            height: 200px;
            transform-style: preserve-3d;
            pointer-events: none; /* Żeby scena nie blokowała stref kontrolnych */
        }

        /* Główny kontener auta z domyślną animacją idle i płynnym przejściem obrotu */
        .car-base {
            width: 100%;
            height: 100%;
            position: absolute;
            transform-style: preserve-3d;
            transform: rotateX(-15deg) rotateY(45deg);
            transition: transform 0.5s ease-out;
            animation: float 3s ease-in-out infinite alternate;
        }

        /* Efekt lekkiego unoszenia się auta (idle) */
        @keyframes float {
            0% { translateY: 0px; }
            100% { translateY: -10px; }
        }

        /* Wspólne właściwości dla każdej ściany 3D */
        .face {
            position: absolute;
            background-size: cover;
            box-sizing: border-box;
            border: 2px solid #111;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.6);
        }

        /* Kolor karoserii (sportowa czerwień) */
        .paint { background-color: #d32f2f; }
        .glass { background-color: rgba(41, 128, 185, 0.7); border: 3px solid #2c3e50; }

        /* --- GEOMETRIA AUTA --- */

        /* 1. Podwozie/Dół korpusu (Szerokość: 300px, Wysokość: 60px, Głębokość: 160px) */
        .chassis-front  { width: 160px; height: 60px; transform: rotateY(0deg) translateZ(150px); left: 120px; }
        .chassis-back   { width: 160px; height: 60px; transform: rotateY(180deg) translateZ(150px); left: 120px; }
        .chassis-left   { width: 300px; height: 60px; transform: rotateY(-90deg) translateZ(80px); left: 50px; }
        .chassis-right  { width: 300px; height: 60px; transform: rotateY(90deg) translateZ(80px); left: 50px; }
        .chassis-top    { width: 300px; height: 160px; transform: rotateX(90deg) translateZ(30px); left: 50px; }
        .chassis-bottom { width: 300px; height: 160px; transform: rotateX(-90deg) translateZ(30px); left: 50px; background: #111; }

        /* Detale podwozia (Światła) */
        .chassis-front::before, .chassis-front::after {
            content: ''; position: absolute; top: 15px; width: 30px; height: 15px;
            background: #fff; box-shadow: 0 0 15px #fff; border-radius: 3px;
        }
        .chassis-front::before { left: 15px; }
        .chassis-front::after { right: 15px; }

        .chassis-back::before, .chassis-back::after {
            content: ''; position: absolute; top: 15px; width: 35px; height: 10px;
            background: #f44336; box-shadow: 0 0 10px #f44336;
        }
        .chassis-back::before { left: 15px; }
        .chassis-back::after { right: 15px; }


        /* 2. Kabina (Szerokość: 160px, Wysokość: 50px, Głębokość: 140px) */
        /* Przesunięta do góry (translateY(-55px)) i wyśrodkowana */
        .cabin-front  { width: 140px; height: 50px; transform: rotateY(0deg) translateZ(70px) translateY(-55px); left: 130px; }
        .cabin-back   { width: 140px; height: 50px; transform: rotateY(180deg) translateZ(70px) translateY(-55px); left: 130px; }
        .cabin-left   { width: 160px; height: 50px; transform: rotateY(-90deg) translateZ(70px) translateY(-55px); left: 120px; }
        .cabin-right  { width: 160px; height: 50px; transform: rotateY(90deg) translateZ(70px) translateY(-55px); left: 120px; }
        .cabin-top    { width: 160px; height: 140px; transform: rotateX(90deg) translateZ(80px); left: 120px; }


        /* 3. KOŁA (4 sztuki) */
        .wheel {
            position: absolute;
            width: 60px;
            height: 60px;
            background: #222;
            border-radius: 50%;
            border: 5px dashed #555;
            transform-style: preserve-3d;
            box-shadow: inset 0 0 10px #000;
            animation: spin 1s linear infinite;
        }

        /* Animacja kręcących się kół */
        @keyframes spin {
            100% { transform: rotateY(var(--rY)) rotateX(360deg); }
        }

        /* Pozycjonowanie każdego koła w przestrzeni 3D */
        .w-front-left  { left: 80px;  top: 30px; --rY: -90deg; transform: rotateY(var(--rY)) translateZ(82px); }
        .w-front-right { left: 80px;  top: 30px; --rY: 90deg;  transform: rotateY(var(--rY)) translateZ(82px); }
        .w-back-left   { left: 260px; top: 30px; --rY: -90deg; transform: rotateY(var(--rY)) translateZ(82px); }
        .w-back-right  { left: 260px; top: 30px; --rY: 90deg;  transform: rotateY(var(--rY)) translateZ(82px); }

        /* Środki felg */
        .wheel::after {
            content: ''; position: absolute; top: 15px; left: 15px; width: 20px; height: 20px;
            background: #bbb; border-radius: 50%; box-shadow: 0 0 5px #000;
        }

        /* Cień pod autem */
        .shadow {
            position: absolute;
            width: 340px;
            height: 180px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 40px;
            transform: rotateX(90deg) translateZ(-40px);
            left: 30px;
            filter: blur(15px);
        }
    </style>
</head>
<body>

    <h1>Trójwymiarowe Auto w CSS</h1>
    <p>Przesuwaj myszkę poziomo po ekranie, aby obracać pojazd dookoła</p>

    <div class="rotation-controller">
        <div class="zone"></div>
        <div class="zone"></div>
        <div class="zone"></div>
        <div class="zone"></div>
        <div class="zone"></div>
        <div class="zone"></div>
        <div class="zone"></div>
        <div class="zone"></div>
        <div class="zone"></div>
        <div class="zone"></div>
        
        <div class="scene">
            <div class="car-base">
                
                <div class="shadow"></div>

                <div class="face paint chassis-front"></div>
                <div class="face paint chassis-back"></div>
                <div class="face paint chassis-left"></div>
                <div class="face paint chassis-right"></div>
                <div class="face paint chassis-top"></div>
                <div class="face chassis-bottom"></div>

                <div class="face glass cabin-front"></div>
                <div class="face glass cabin-back"></div>
                <div class="face glass cabin-left"></div>
                <div class="face glass cabin-right"></div>
                <div class="face paint cabin-top"></div>

                <div class="wheel w-front-left"></div>
                <div class="wheel w-front-right"></div>
                <div class="wheel w-back-left"></div>
                <div class="wheel w-back-right"></div>

            </div>
        </div>
    </div>

</body>
</html>
