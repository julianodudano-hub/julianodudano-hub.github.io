<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Space Survival - HTML5 Mobile Game</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #050510;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #gameCanvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        /* UI Gry */
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            z-index: 10;
            pointer-events: none;
            font-size: 16px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        .bar-container {
            width: 200px;
            height: 15px;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 5px;
            border: 1px solid rgba(255,255,255,0.4);
        }
        #hpBar { width: 100%; height: 100%; background: #ff4757; transition: width 0.1s; }
        #xpBar { width: 0%; height: 100%; background: #2ed573; transition: width 0.2s; }

        /* Joystick Mobilny */
        #joystickZone {
            position: absolute;
            bottom: 40px;
            left: 40px;
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            z-index: 10;
            display: none; /* Włączane przez JS na dotyk */
            justify-content: center;
            align-items: center;
        }
        #joystickStick {
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            position: absolute;
        }

        /* Ekrany menu */
        .screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 20; color: white;
            background: rgba(5, 5, 16, 0.85);
            backdrop-filter: blur(5px);
        }
        h1 { font-size: 3rem; margin-bottom: 20px; color: #00d2d3; text-shadow: 0 0 10px #00d2d3; }
        button {
            padding: 15px 40px; font-size: 1.5rem; background: #10ac84;
            color: white; border: none; border-radius: 30px; cursor: pointer;
            box-shadow: 0 4px 15px rgba(16, 172, 132, 0.4); transition: 0.2s;
        }
        button:hover { transform: scale(1.05); background: #1dd1a1; }
        
        /* Menu Ulepszeń (Level Up) */
        #upgradeMenu { display: none; }
        .upgrade-options { display: flex; gap: 20px; margin-top: 20px; }
        .upgrade-card {
            background: #222f3e; border: 2px solid #576574; border-radius: 15px;
            padding: 20px; width: 150px; text-align: center; cursor: pointer; transition: 0.2s;
        }
        .upgrade-card:hover { border-color: #00d2d3; transform: translateY(-5px); }

        #gameOverScreen { display: none; }
    </style>
</head>
<body>

    <div id="ui">
        <div>HP:</div>
        <div class="bar-container"><div id="hpBar"></div></div>
        <div>XP (Poziom <span id="lblLevel">1</span>):</div>
        <div class="bar-container"><div id="xpBar"></div></div>
        <div>Punkty: <span id="lblScore">0</span></div>
        <div style="font-size: 12px; margin-top: 5px; opacity: 0.7;">Sterowanie: WSAD / Dotyk na ekranie</div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="joystickZone">
        <div id="joystickStick"></div>
    </div>

    <div id="startScreen" class="screen">
        <h1>SPACE SURVIVAL</h1>
        <button id="btnStart">GRAJ</button>
    </div>

    <div id="upgradeMenu" class="screen">
        <h1>AWANS! Wybierz ulepszenie</h1>
        <div class="upgrade-options">
            <div class="upgrade-card" onclick="chooseUpgrade('speed')">
                <h3>Szybkość</h3>
                <p>+15% prędkości ruchu</p>
            </div>
            <div class="upgrade-card" onclick="chooseUpgrade('damage')">
                <h3>Moc</h3>
                <p>+25% obrażeń broni</p>
            </div>
            <div class="upgrade-card" onclick="chooseUpgrade('heal')">
                <h3>Naprawa</h3>
                <p>Leczy 50% HP</p>
            </div>
        </div>
    </div>

    <div id="gameOverScreen" class="screen">
        <h1 style="color: #ff4757; text-shadow: 0 0 10px #ff4757;">KONIEC GRY</h1>
        <p style="font-size: 1.5rem; margin-bottom: 20px;">Twój wynik: <span id="lblFinalScore">0</span></p>
        <button id="btnRestart">Zagraj Ponownie</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Dopasowanie rozmiaru canvasu
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Stan Gry
        let gameActive = false;
        let score = 0;
        let level = 1;
        let xp = 0;
        let xpNeeded = 100;
        let keys = {};
        let enemies = [];
        let bullets = [];
        let particles = [];
        let spawnTimer = 0;
        let waveMultiplier = 1;

        // Statystyki gracza
        const player = {
            x: 0, y: 0,
            radius: 20,
            speed: 4,
            maxHp: 100,
            hp: 100,
            damage: 25,
            shootCooldown: 0,
            shootInterval: 20, // klatki między strzałami
            angle: 0
        };

        // Sterowanie Mobilne (Joystick)
        const joystickZone = document.getElementById('joystickZone');
        const joystickStick = document.getElementById('joystickStick');
        let touchId = null;
        let joystickActive = false;
        let joystickStart = { x: 0, y: 0 };
        let joystickMove = { x: 0, y: 0 };
        let moveVector = { x: 0, y: 0 };
        let isMobile = false;

        // Wykrywanie urządzenia mobilnego na podstawie dotyku
        window.addEventListener('touchstart', function initTouch() {
            isMobile = true;
            joystickZone.style.display = 'flex';
            window.removeEventListener('touchstart', initTouch);
        });

        // Eventy Klawiatury
        window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
        
        // Myszką celujemy na PC
        let mouseX = 0, mouseY = 0;
        window.addEventListener('mousemove', e => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        // Obsługa Dotyku (Joystick)
        window.addEventListener('touchstart', e => {
            if (!gameActive) return;
            const touch = e.changedTouches[0];
            // Aktywuj joystick tam gdzie gracz dotknął ekranu (dolna/lewa połowa)
            if (touch.clientX < window.innerWidth / 2 && touch.clientY > window.innerHeight / 3) {
                touchId = touch.identifier;
                joystickActive = true;
                joystickZone.style.left = `${touch.clientX - 60}px`;
                joystickZone.style.bottom = `${window.innerHeight - touch.clientY - 60}px`;
                joystickStart = { x: touch.clientX, y: touch.clientY };
                joystickStick.style.transform = 'translate(0px, 0px)';
            }
        });

        window.addEventListener('touchmove', e => {
            if (!joystickActive) return;
            for (let touch of e.changedTouches) {
                if (touch.identifier === touchId) {
                    let distX = touch.clientX - joystickStart.x;
                    let distY = touch.clientY - joystickStart.y;
                    const maxDist = 50;
                    const angle = Math.atan2(distY, distX);
                    const distance = Math.min(maxDist, Math.hypot(distX, distY));

                    joystickMove.x = Math.cos(angle) * distance;
                    joystickMove.y = Math.sin(angle) * distance;

                    joystickStick.style.transform = `translate(${joystickMove.x}px, ${joystickMove.y}px)`;

                    // Wektor ruchu od -1 do 1
                    moveVector.x = joystickMove.x / maxDist;
                    moveVector.y = joystickMove.y / maxDist;
                }
            }
        });

        window.addEventListener('touchend', e => {
            for (let touch of e.changedTouches) {
                if (touch.identifier === touchId) {
                    joystickActive = false;
                    touchId = null;
                    moveVector = { x: 0, y: 0 };
                    joystickStick.style.transform = 'translate(0px, 0px)';
                    // Przywróć pozycję domyślną joysticka
                    joystickZone.style.left = '40px';
                    joystickZone.style.bottom = '40px';
                }
            }
        });

        // Inicjalizacja Nowej Gry
        function initGame() {
            player.x = canvas.width / 2;
            player.y = canvas.height / 2;
            player.hp = player.maxHp;
            player.speed = 4;
            player.damage = 25;
            score = 0;
            level = 1;
            xp = 0;
            xpNeeded = 100;
            enemies = [];
            bullets = [];
            particles = [];
            waveMultiplier = 1;
            updateUI();
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('gameOverScreen').style.display = 'none';
            document.getElementById('upgradeMenu').style.display = 'none';
            gameActive = true;
        }

        // Aktualizacja UI HTML
        function updateUI() {
            document.getElementById('hpBar').style.width = `${Math.max(0, (player.hp / player.maxHp) * 100)}%`;
            document.getElementById('xpBar').style.width = `${(xp / xpNeeded) * 100}%`;
            document.getElementById('lblLevel').innerText = level;
            document.getElementById('lblScore').innerText = score;
        }

        // Cząsteczki (Eksplozje)
        function spawnParticles(x, y, color, count = 10) {
            for(let i=0; i<count; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 6,
                    vy: (Math.random() - 0.5) * 6,
                    radius: Math.random() * 3 + 1,
                    alpha: 1,
                    color: color
                });
            }
        }

        // Logika awansu (Level up)
        function checkLevelUp() {
            if (xp >= xpNeeded) {
                xp -= xpNeeded;
                level++;
                xpNeeded = Math.floor(xpNeeded * 1.4);
                updateUI();
                
                // Pauza gry i menu wyboru ulepszeń
                gameActive = false;
                document.getElementById('upgradeMenu').style.display = 'flex';
            }
        }

        function chooseUpgrade(type) {
            if(type === 'speed') player.speed *= 1.15;
            if(type === 'damage') player.damage += 10;
            if(type === 'heal') player.hp = Math.min(player.maxHp, player.hp + player.maxHp * 0.5);
            
            document.getElementById('upgradeMenu').style.display = 'none';
            gameActive = true;
            updateUI();
            gameLoop();
        }

        // Główna pętla gry
        function gameLoop() {
            if (!gameActive) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // --- 1. RUCH GRACZA ---
            let dx = 0;
            let dy = 0;

            if (keys['w'] || keys['arrowup']) dy = -1;
            if (keys['s'] || keys['arrowdown']) dy = 1;
            if (keys['a'] || keys['arrowleft']) dx = -1;
            if (keys['d'] || keys['arrowright']) dx = 1;

            // Normalizacja ruchu z klawiatury
            if (dx !== 0 && dy !== 0) {
                dx *= 0.7071;
                dy *= 0.7071;
            }

            // Nadpisanie jeśli działa joystick mobilny
            if (joystickActive) {
                dx = moveVector.x;
                dy = moveVector.y;
            }

            player.x += dx * player.speed;
            player.y += dy * player.speed;

            // Granice ekranu dla gracza
            player.x = Math.max(player.radius, Math.min(canvas.width - player.radius, player.x));
            player.y = Math.max(player.radius, Math.min(canvas.height - player.radius, player.y));

            // --- 2. OBROT GRACZA I AUTOMATYCZNE CELOWANIE (MOBILE) ---
            let targetAngle = player.angle;
            let nearestEnemy = null;
            let minDist = Infinity;

            // Szukanie najbliższego wroga do auto-celowania
            enemies.forEach(e => {
                let d = Math.hypot(e.x - player.x, e.y - player.y);
                if (d < minDist) { minDist = d; nearestEnemy = e; }
            });

            if (isMobile && nearestEnemy) {
                // Na telefonie celuje automatycznie w najbliższego wroga
                targetAngle = Math.atan2(nearestEnemy.y - player.y, nearestEnemy.x - player.x);
            } else if (!isMobile) {
                // Na PC celuje za myszką
                targetAngle = Math.atan2(mouseY - player.y, mouseX - player.x);
            }
            player.angle = targetAngle;

            // --- 3. STRZELANIE ---
            if (player.shootCooldown > 0) player.shootCooldown--;
            
            // Strzela automatycznie na telefonie (jeśli są wrogowie) lub na PC cały czas
            if (player.shootCooldown === 0 && (!isMobile || (isMobile && enemies.length > 0))) {
                bullets.push({
                    x: player.x + Math.cos(player.angle) * player.radius,
                    y: player.y + Math.sin(player.angle) * player.radius,
                    vx: Math.cos(player.angle) * 8,
                    vy: Math.sin(player.angle) * 8,
                    radius: 4,
                    damage: player.damage
                });
                player.shootCooldown = player.shootInterval;
            }

            // --- 4. MECHANIKA PRZECIWNIKÓW (SPAWN) ---
            spawnTimer++;
            if (spawnTimer > Math.max(20, 80 - level * 3)) { // Im wyższy lvl tym szybciej wychodzą
                spawnTimer = 0;
                // Losuj pozycję na krawędzi ekranu
                let sx, sy;
                if (Math.random() < 0.5) {
                    sx = Math.random() < 0.5 ? -30 : canvas.width + 30;
                    sy = Math.random() * canvas.height;
                } else {
                    sx = Math.random() * canvas.width;
                    sy = Math.random() < 0.5 ? -30 : canvas.height + 30;
                }

                // Typy wrogów zależne od fali punkuów/poziomu
                let rand = Math.random() * level;
                let type = { hp: 40, speed: 1.5, radius: 15, color: '#ff6b6b', xp: 20 }; // Zwykły
                
                if (rand > 5) { // Szybki
                    type = { hp: 20, speed: 3, radius: 12, color: '#feca57', xp: 35 };
                }
                if (rand > 12) { // Boss / Ciężki
                    type = { hp: 200, speed: 0.8, radius: 30, color: '#ff5252', xp: 100 };
                }

                enemies.push({
                    x: sx, y: sy,
                    hp: type.hp, maxHp: type.hp,
                    speed: type.speed,
                    radius: type.radius,
                    color: type.color,
                    xpValue: type.xp
                });
            }

            // --- 5. RYSOWANIE I AKTUALIZACJA OBIEKTÓW ---

            // Rysowanie Gracza (Statek)
            ctx.save();
            ctx.translate(player.x, player.y);
            ctx.rotate(player.angle);
            ctx.fillStyle = '#00d2d3';
            ctx.beginPath();
            ctx.moveTo(player.radius, 0);
            ctx.lineTo(-player.radius, -player.radius*0.7);
            ctx.lineTo(-player.radius*0.5, 0);
            ctx.lineTo(-player.radius, player.radius*0.7);
            ctx.closePath();
            ctx.fill();
            ctx.restore();

            // Pociski
            for (let i = bullets.length - 1; i >= 0; i--) {
                let b = bullets[i];
                b.x += b.vx;
                b.y += b.vy;

                ctx.fillStyle = '#ffffd2';
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
                ctx.fill();

                // Usuń pociski za ekranem
                if (b.x < 0 || b.x > canvas.width || b.y < 0 || b.y > canvas.height) {
                    bullets.splice(i, 1);
                }
            }

            // Przeciwnicy
            for (let i = enemies.length - 1; i >= 0; i--) {
                let e = enemies[i];
                let angleToPlayer = Math.atan2(player.y - e.y, player.x - e.x);
                
                e.x += Math.cos(angleToPlayer) * e.speed;
                e.y += Math.sin(angleToPlayer) * e.speed;

                // Rysowanie wroga
                ctx.fillStyle = e.color;
                ctx.beginPath();
                ctx.arc(e.x, e.y, e.radius, 0, Math.PI * 2);
                ctx.fill();

                // Paski życia nad bossami/silniejszymi wrogami
                if (e.maxHp > 40) {
                    ctx.fillStyle = 'rgba(0,0,0,0.5)';
                    ctx.fillRect(e.x - e.radius, e.y - e.radius - 10, e.radius*2, 4);
                    ctx.fillStyle = '#ff4757';
                    ctx.fillRect(e.x - e.radius, e.y - e.radius - 10, (e.hp / e.maxHp) * (e.radius*2), 4);
                }

                // Kolizja wroga z graczem
                let distToPlayer = Math.hypot(player.x - e.x, player.y - e.y);
                if (distToPlayer < player.radius + e.radius) {
                    player.hp -= 0.5; // Ciągłe obrażenia przy kontakcie
                    updateUI();
                    if (player.hp <= 0) {
                        endGame();
                    }
                }

                // Kolizja wroga z pociskami
                for (let j = bullets.length - 1; j >= 0; j--) {
                    let b = bullets[j];
                    let distToBullet = Math.hypot(b.x - e.x, b.y - e.y);
                    if (distToBullet < e.radius + b.radius) {
                        e.hp -= b.damage;
                        spawnParticles(b.x, b.y, e.color, 3);
                        bullets.splice(j, 1);

                        if (e.hp <= 0) {
                            spawnParticles(e.x, e.y, e.color, 15);
                            score += e.maxHp;
                            xp += e.xpValue;
                            enemies.splice(i, 1);
                            updateUI();
                            checkLevelUp();
                            break;
                        }
                    }
                }
            }

            // Cząsteczki (Particles)
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.alpha -= 0.02;

                ctx.save();
                ctx.globalAlpha = p.alpha;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();

                if (p.alpha <= 0) particles.splice(i, 1);
            }

            requestAnimationFrame(gameLoop);
        }

        function endGame() {
            gameActive = false;
            document.getElementById('lblFinalScore').innerText = score;
            document.getElementById('gameOverScreen').style.display = 'flex';
        }

        // Listenery przycisków menu
        document.getElementById('btnStart').addEventListener('click', initGame);
        document.getElementById('btnRestart').addEventListener('click', initGame);

        // Pierwsze uruchomienie pętli (zatrzyma się na ekranie powitalnym)
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
